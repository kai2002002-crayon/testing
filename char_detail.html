        const updateTag = (id, label, value, prefix) => {
            const el = document.getElementById(id);
            const iconUrl = ICON_MAP[`${prefix}_${value}`] || "";
            el.innerHTML = `
                ${iconUrl ? `<img src="${iconUrl}" class="w-4 h-4 object-contain mr-1.5">` : ""}
                <span>${label}：${value}</span>
            `;
        };

        const renderError = (msg) => {
            document.getElementById('mainContainer').innerHTML = `
                <div class="text-center p-10 font-bold text-red-600 text-lg">
                    ${msg}
                </div>
            `;
        };

        // 避免 XSS 攻擊的字元跳脫函數
        const escapeHTML = (str) => {
            return str.replace(/[&<>'"]/g, 
                tag => ({
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    "'": '&#39;',
                    '"': '&quot;'
                }[tag])
            );
        };

        // 全域變數，記錄當前顯示的角色名稱
        let currentTargetName = "";

        // 強制在網頁載入後才執行，避免抓不到元素
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            currentTargetName = urlParams.get('char')?.trim();

            if (!currentTargetName) {
                renderError("❌ 未指定角色，請從主頁點擊角色按鈕進入。");
                return;
            }

            if (typeof INITIAL_DATA === 'undefined') {
                renderError("❌ 載入失敗：找不到 INITIAL_DATA。<br>請確認 data.js 檔案存在且在同一資料夾。");
                return;
            }

            const charData = INITIAL_DATA.find(c => c.name.trim() === currentTargetName);
            if (!charData) {
                renderError(`❌ 找不到名稱為「${currentTargetName}」的角色資料。`);
                return;
            }

            // 填入基本資料
            document.getElementById('charName').innerText = charData.name;
            updateTag('charPersonality', '性格', charData.personality, 'personality');
            updateTag('charRace', '種族', charData.race, 'race');
            updateTag('charPosition', '站位', charData.position, 'position');
            updateTag('charJob', '職業', charData.job, 'job');

            const avatarBox = document.getElementById('charAvatar');
            const imgUrl = IMAGE_MAP[`avatar_${charData.name}`];
            if (imgUrl) {
                avatarBox.innerHTML = `<img src="${imgUrl}" class="w-full h-full object-cover">`;
            } else {
                avatarBox.innerText = charData.name.charAt(0);
            }

            const renderCrayonList = (elementId, array) => {
                const ul = document.getElementById(elementId);
                ul.innerHTML = array.map(attr => `<li>${attr}</li>`).join('');
            };
            renderCrayonList('layer1List', charData.layer1);
            renderCrayonList('layer2List', charData.layer2);
            renderCrayonList('layer3List', charData.layer3);

            document.title = `${charData.name} - 角色詳細資料`;

            // 處理技能區塊
            const skillsContainer = document.getElementById('skillsContainer');
            
            if (typeof characterSkills === 'undefined') {
                skillsContainer.innerHTML = `<div class="p-4 bg-red-50 text-red-600 font-bold border border-red-200 rounded-xl text-center">❌ 找不到 skill.js 資料，請確認檔案存在。</div>`;
            } else {
                const charSkillData = characterSkills.find(s => s.name.trim() === currentTargetName);
                
                if (charSkillData) {
                    let html = "";
                    const makeStatChips = (statsArray) => {
                        if (!statsArray || statsArray.length === 0) return '';
                        return `<div class="flex flex-wrap gap-1.5 mt-2">` + 
                            statsArray.map(stat => `<span class="px-2 py-0.5 bg-white border border-gray-200 text-gray-700 text-[11px] font-bold rounded-md shadow-sm">${stat}</span>`).join('') + 
                            `</div>`;
                    };

                    const normalAttackIcon = charSkillData.attribute === "物理" ? SKILL_ICONS["attack_物理"] : SKILL_ICONS["attack_魔法"];
                    const normalSkillIcon = SKILL_ICONS[`skill_normal_${currentTargetName}`] || "";
                    const ultSkillIcon = SKILL_ICONS[`hover_avatar_${currentTargetName}`] || "";
                    const passiveSkillIcon = SKILL_ICONS[`skill_passive_${currentTargetName}`] || "";

                    html += `
                        <div class="bg-slate-50 border-2 border-slate-300 rounded-xl p-4 shadow-sm">
                            <div class="flex justify-between items-center border-b border-slate-200 pb-2 mb-3">
                                <div class="flex items-center gap-2">
                                    ${normalAttackIcon ? `<img src="${normalAttackIcon}" class="w-8 h-8 rounded-lg shadow-sm border border-slate-300">` : `<span>🎯</span>`}
                                    <span class="font-extrabold text-slate-800 text-base">普通攻擊</span>
                                </div>
                            </div>
                            <div class="space-y-2 text-xs">
                                <p class="text-gray-600"><strong class="text-slate-700">【基本】</strong>${charSkillData.normalAttack.basic}</p>
                                ${charSkillData.normalAttack.enhanced !== "無" ? `<p class="text-gray-600"><strong class="text-slate-700">【強化】</strong>${charSkillData.normalAttack.enhanced}</p>` : ''}
                            </div>
                        </div>
                    `;

                    html += `
                        <div class="bg-emerald-50/80 border-2 border-emerald-300 rounded-xl p-4 shadow-sm">
                            <div class="flex justify-between items-center border-b border-emerald-200 pb-2 mb-3">
                                <div class="flex items-center gap-2">
                                    ${normalSkillIcon ? `<img src="${normalSkillIcon}" class="w-8 h-8 rounded-lg shadow-sm border border-emerald-300">` : `<span>🟢</span>`}
                                    <span class="font-extrabold text-emerald-800 text-base">${charSkillData.normalSkill.name}</span>
                                </div>
                            </div>
                            <p class="text-xs text-gray-600 font-medium leading-relaxed">${charSkillData.normalSkill.desc}</p>
                            ${makeStatChips(charSkillData.normalSkill.stats)}
                        </div>
                    `;

                    html += `
                        <div class="bg-violet-50/80 border-2 border-violet-300 rounded-xl p-4 shadow-sm">
                            <div class="flex justify-between items-center border-b border-violet-200 pb-2 mb-3">
                                <div class="flex items-center gap-2">
                                    ${ultSkillIcon ? `<img src="${ultSkillIcon}" class="w-8 h-8 rounded-lg shadow-sm border border-violet-300">` : `<span>🔥</span>`}
                                    <span class="font-extrabold text-violet-800 text-base">${charSkillData.ultimateSkill.name}</span>
                                </div>
                                <span class="px-2 py-0.5 bg-violet-600 text-white font-black text-[10px] rounded-md shadow-sm">CD: ${charSkillData.ultimateSkill.cooldown}</span>
                            </div>
                            <p class="text-xs text-gray-600 font-medium leading-relaxed">${charSkillData.ultimateSkill.desc}</p>
                            ${makeStatChips(charSkillData.ultimateSkill.stats)}
                        </div>
                    `;

                    html += `
                        <div class="bg-amber-50/70 border-2 border-amber-300 rounded-xl p-4 shadow-sm">
                            <div class="flex justify-between items-center border-b border-amber-200 pb-2 mb-3">
                                <div class="flex items-center gap-2">
                                    ${passiveSkillIcon ? `<img src="${passiveSkillIcon}" class="w-8 h-8 rounded-lg shadow-sm border border-amber-300">` : `<span>✨</span>`}
                                    <span class="font-extrabold text-amber-800 text-base">被動技能</span>
                                </div>
                            </div>
                            <p class="text-xs text-gray-600 font-medium leading-relaxed">${charSkillData.passiveSkill.desc}</p>
                            ${makeStatChips(charSkillData.passiveSkill.stats)}
                        </div>
                    `;

                    skillsContainer.innerHTML = html;
                } else {
                    skillsContainer.innerHTML = `<div class="p-4 bg-gray-50 text-gray-500 font-bold border border-gray-200 rounded-xl text-center">⚠️ 找不到「${currentTargetName}」的技能資料，請確認 skill.js 中有此角色。</div>`;
                }
            }

            // 🌟 啟動留言板讀取功能
            loadComments(currentTargetName);
        };

        // ==========================================
        // 🌟 留言板功能邏輯
        // ==========================================
        
        // 讀取留言 (即時監聽)
        function loadComments(charName) {
            db.collection("character_comments")
              .where("character", "==", charName)
              .orderBy("timestamp", "desc")
              .onSnapshot((snapshot) => {
                  const list = document.getElementById('commentsList');
                  
                  if (snapshot.empty) {
                      list.innerHTML = `<div class="text-center text-sm font-bold text-gray-400 py-8 bg-gray-50 rounded-xl border border-dashed border-gray-200">目前還沒有評價，來搶頭香吧！ 🐾</div>`;
                      return;
                  }
                  
                  let html = "";
                  snapshot.forEach(doc => {
                      const data = doc.data();
                      // 格式化時間 (如果剛送出，timestamp 可能暫時為 null)
                      const timeString = data.timestamp ? new Date(data.timestamp.toDate()).toLocaleString('zh-TW', {
                          month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit'
                      }) : "剛剛";
                      
                      html += `
                          <div class="bg-white p-3 sm:p-4 rounded-xl border border-gray-200 shadow-sm transition hover:shadow-md">
                              <div class="flex justify-between items-baseline mb-2 border-b border-gray-100 pb-2">
                                  <span class="font-black text-sm text-amber-900 flex items-center gap-1">
                                      👤 ${escapeHTML(data.author)}
                                  </span>
                                  <span class="text-[10px] sm:text-xs text-gray-400 font-medium">${timeString}</span>
                              </div>
                              <p class="text-sm text-gray-700 whitespace-pre-wrap leading-relaxed">${escapeHTML(data.content)}</p>
                          </div>
                      `;
                  });
                  list.innerHTML = html;
              }, (error) => {
                  console.error("讀取留言失敗:", error);
                  document.getElementById('commentsList').innerHTML = `<div class="text-center text-red-500 font-bold text-sm py-4">讀取留言失敗，請確認資料庫權限設定。</div>`;
              });
        }

        // 送出留言
        function submitComment() {
            const authorInput = document.getElementById('commentAuthor').value.trim() || '匿名教主';
            const contentInput = document.getElementById('commentContent').value.trim();
            const btn = document.getElementById('submitCommentBtn');

            if (!contentInput) {
                alert('請輸入評價內容！');
                return;
            }

            if (contentInput.length > 500) {
                alert('評價內容太長囉，請縮減至 500 字以內！');
                return;
            }

            // 防止重複點擊
            btn.disabled = true;
            btn.innerHTML = '傳送中... ⏳';
            btn.classList.replace('bg-amber-500', 'bg-gray-400');

            db.collection("character_comments").add({
                character: currentTargetName,
                author: authorInput,
                content: contentInput,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            }).then(() => {
                // 清空輸入框內容 (保留暱稱方便下次留言)
                document.getElementById('commentContent').value = '';
                
                // 恢復按鈕狀態
                btn.disabled = false;
                btn.innerHTML = '送出評價 🚀';
                btn.classList.replace('bg-gray-400', 'bg-amber-500');
            }).catch(err => {
                console.error("留言失敗:", err);
                alert("留言失敗，請稍後再試！");
                
                // 恢復按鈕狀態
                btn.disabled = false;
                btn.innerHTML = '送出評價 🚀';
                btn.classList.replace('bg-gray-400', 'bg-amber-500');
            });
        }
    </script>
</body>
</html>
