        };

        const updateTag = (id, label, value, prefix) => {
            const el = document.getElementById(id);
            const iconUrl = ICON_MAP[`${prefix}_${value}`] || "";
            el.innerHTML = `
                ${iconUrl ? `<img src="${iconUrl}" class="w-4 h-4 object-contain mr-1.5">` : ""}
                <span>${label}：${value}</span>
            `;
        };

        const renderError = (msg) => {
            document.getElementById('mainContainer').innerHTML = `
                <div class="text-center p-10 font-bold text-red-600 dark:text-red-400 text-lg">
                    ${msg}
                </div>
            `;
        };

        const escapeHTML = (str) => {
            return str.replace(/[&<>'"]/g, 
                tag => ({
                    '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
                }[tag])
            );
        };

        let currentTargetName = "";

        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            currentTargetName = urlParams.get('char')?.trim();

            if (!currentTargetName) { renderError("❌ 未指定角色，請從主頁點擊角色按鈕進入。"); return; }
            if (typeof INITIAL_DATA === 'undefined') { renderError("❌ 載入失敗：找不到 INITIAL_DATA。"); return; }

            const charData = INITIAL_DATA.find(c => c.name.trim() === currentTargetName);
            if (!charData) { renderError(`❌ 找不到名稱為「${currentTargetName}」的角色資料。`); return; }

            document.getElementById('charName').innerText = charData.name;
            updateTag('charPersonality', '性格', charData.personality, 'personality');
            updateTag('charRace', '種族', charData.race, 'race');
            updateTag('charPosition', '站位', charData.position, 'position');
            updateTag('charJob', '職業', charData.job, 'job');

            // 🌟 核心升級：Spine 動態圖讀取與互動邏輯
            const avatarBox = document.getElementById('charAvatar');
            const spineKey = SPINE_MAP[charData.name]; // 拿取您對應的英文路徑名稱

            if (spineKey) {
    
                // ==========================================
                // 🎁 升級版：動態顯示珍藏品名稱與圖片邏輯
                // ==========================================
                const presentContainer = document.getElementById('presentContainer');
                const presentNameBox = document.getElementById('presentName');
                const DEFAULT_NO_PRESENT_URL = "https://i.postimg.cc/qtwD6bsq/Icon-Present.png";
    
                let finalImgUrl = DEFAULT_NO_PRESENT_URL;
                let presentDisplayName = "珍藏品正在送遞中..."; // 🌟 關鍵修改：未實裝角色的預設文字
                let isHasPresent = false;

                // 🔍 比對並取得當前角色的珍藏品資料
                if (PRESENT_MAP[spineKey]) {
                    finalImgUrl = PRESENT_MAP[spineKey].url;
                    isHasPresent = true;
        
                    // 如果名稱不為空值，就用表單內的名字；如果是空的（例如 Kyarot/Ner），就自動填寫「角色名 的珍藏品」
                    if (PRESENT_MAP[spineKey].name && PRESENT_MAP[spineKey].name.trim() !== "") {
                        presentDisplayName = PRESENT_MAP[spineKey].name;
                    } else {
                        presentDisplayName = `${charData.name}的珍藏品`;
                    }
                }

                // ✍️ 渲染名稱區塊
                if (presentNameBox) {
                    presentNameBox.innerText = presentDisplayName;
        
                    // 賦予溫馨主題與暗夜模式的基礎設定
                    presentNameBox.className = "mb-3 tracking-wide px-4 py-1 rounded-full border transition-colors duration-300 block";
        
                    if (!isHasPresent) {
                        // ⏳ 送遞中狀態：淡淡的玫瑰色底，虛線外框
                        presentNameBox.classList.add(
                            'text-sm', 'text-rose-400', 'dark:text-gray-400', 
                            'bg-rose-50', 'dark:bg-gray-800/50', 
                            'border-rose-200', 'dark:border-gray-700', 'border-dashed'
                        );
                    } else {
                        // 🎁 已實裝狀態：溫暖且明顯的粉橘色實體框
                        presentNameBox.classList.add(
                            'text-lg', 'font-bold', 'text-rose-900', 'dark:text-gray-100', 
                            'bg-rose-100', 'dark:bg-gray-800', 
                            'border-rose-300', 'dark:border-gray-600', 'shadow-sm'
                        );
                    }
                }

                // 🚀 渲染圖片區塊
                const altText = isHasPresent ? `${charData.name} - ${presentDisplayName}` : "珍藏品正在送遞中";
                const imgClass = isHasPresent 
                    ? "max-w-full max-h-48 object-contain transition-transform duration-300 hover:scale-105"
                    : "max-w-full max-h-32 object-contain opacity-70"; // 🌟 UI 小優化：送遞中的統一圖示稍微半透明 (opacity-70)

                if (presentContainer) {
                    presentContainer.innerHTML = `
                        <img src="${finalImgUrl}" 
                             alt="${altText}" 
                             class="${imgClass}"
                             loading="lazy"
                             onerror="if(this.src != '${DEFAULT_NO_PRESENT_URL}') this.src='${DEFAULT_NO_PRESENT_URL}'; else this.parentElement.innerHTML='<p class=\'text-gray-500 text-sm\'>⚠️ 珍藏品載入錯誤</p>'">
                    `;
                }
                // ==========================================
                // 🎁 珍藏品代碼結束
                // ==========================================
                avatarBox.innerHTML = ''; // 清空 fallback 文字或提示
                
                let player = new spine.SpinePlayer(avatarBox, {
                    skelUrl: `./spine_assests/${spineKey}/${spineKey}.skel.bytes`,
                    atlasUrl: `./spine_assests/${spineKey}/${spineKey}.atlas.txt`,
                    animation: "Idle_1",     
                    premultipliedAlpha: true,
                    backgroundColor: "#00000000",
                    alpha: true,
                    showControls: false,
                    
                    // 🌟 關鍵升級：鎖定固定鏡頭，關閉自動縮放，還原真實身高差！
                    viewport: {
                        x: -400,     // 鏡頭起始 X 座標 (以 0 為中心，往左抓 400 單位)
                        y: 0,        // 鏡頭起始 Y 座標 (0 通常是角色的腳底板)
                        width: 800,  // 鏡頭總寬度 (數值越大，鏡頭越遠，角色看起來越小)
                        height: 1000 // 鏡頭總高度
                    },

                    success: function (player) {
                        console.log(`✅ ${charData.name} 的 Spine 動畫載入成功！`);
                        
                        // 👗 外觀優化邏輯 (維持不變)
                        const skins = player.skeleton.data.skins;
                        if (skins && skins.length > 1) {
                            const targetSkin = skins.find(s => s.name === 'Normal') || skins.find(s => s.name !== 'default');
                            if (targetSkin) {
                                player.skeleton.setSkinByName(targetSkin.name);
                                player.skeleton.setSlotsToSetupPose();
                            }
                        }

                        // 🎬 閒置與互動計時器魔法
                        const animations = player.skeleton.data.animations;
                        if (animations && animations.length > 1) {
                            
                            let idleTimer = null; // 用來儲存計時器的變數

                            // 📦 封裝：播放動作並確保至少循環 5 秒
                            function playRandomAction() {
                                const animsToPlay = animations.filter(a => a.name !== 'Idle_1');
                                if (animsToPlay.length > 0) {
                                    const randomAnim = animsToPlay[Math.floor(Math.random() * animsToPlay.length)].name;
        
                                    console.log(`🤖 觸發動作: ${randomAnim}`);
        
                                    // 1. 播放隨機動作 (設定為 true，讓它先開始循環)
                                    player.animationState.setAnimation(0, randomAnim, true);
        
                                    // 2. 清除舊計時器
                                    clearTimeout(idleTimer);
        
                                    // 3. 設定一個計時器，5 秒後才准許切換回 Idle_1
                                    idleTimer = setTimeout(() => {
                                        // 切換回待機，且設定為循環
                                        player.animationState.setAnimation(0, "Idle_1", true);
            
                                        // 重新啟動 5 秒後的下一次自動動作
                                        startIdleTimer();
                                    }, 5000); // 強制執行 5 秒
        
                                } else {
                                    startIdleTimer();
                                }
                            }

                            // ⏱️ 封裝：啟動/重設計時器的函數
                            function startIdleTimer() {
                                // 先清除舊的計時器，避免重複疊加
                                clearTimeout(idleTimer);
                                // 重新設定 5 秒 (5000 毫秒) 後執行
                                idleTimer = setTimeout(() => {
                                    playRandomAction();
                                }, 5000);
                            }

                            // 🚀 第一次初始化：載入成功後立刻開始倒數 5 秒
                            startIdleTimer();

                            // 🌟 互動魔法：玩家主動點擊
                            const canvas = avatarBox.querySelector('canvas');
                            if(canvas) {
                                canvas.addEventListener('click', () => {
                                    console.log("👆 玩家主動戳了角色");
                                    // 點擊時直接觸發動作 (內部會自動清除舊計時器並重開 5 秒)
                                    playRandomAction();
                                });
                            }
                        }
                    },
                    error: function (player, reason) {
                        console.warn(`⚠️ Spine 載入失敗，降級顯示靜態圖。原因:`, reason);
                        // 如果破圖或是路徑打錯，退回顯示靜態圖片
                        const imgUrl = IMAGE_MAP[`avatar_${charData.name}`];
                        avatarBox.innerHTML = imgUrl ? `<img src="${imgUrl}" class="w-full h-full object-cover">` : charData.name.charAt(0);
                    }
                });
            } else {
                // 如果角色不在清單中，維持原本的靜態圖片
                const imgUrl = IMAGE_MAP[`avatar_${charData.name}`];
                if (imgUrl) {
                    avatarBox.innerHTML = `<img src="${imgUrl}" class="w-full h-full object-cover">`;
                } else {
                    avatarBox.innerText = charData.name.charAt(0);
                }
            }

            const renderCrayonList = (elementId, array) => {
                const ul = document.getElementById(elementId);
                ul.innerHTML = array.map(attr => `<li>${attr}</li>`).join('');
            };
            renderCrayonList('layer1List', charData.layer1);
            renderCrayonList('layer2List', charData.layer2);
            renderCrayonList('layer3List', charData.layer3);

            document.title = `${charData.name} - 角色詳細資料`;

            const skillsContainer = document.getElementById('skillsContainer');
            
            if (typeof characterSkills === 'undefined') {
                skillsContainer.innerHTML = `<div class="p-4 bg-red-50 dark:bg-red-900/30 text-red-600 dark:text-red-400 font-bold border border-red-200 dark:border-red-800 rounded-xl text-center">❌ 找不到 skill.js 資料，請確認檔案存在。</div>`;
            } else {
                const charSkillData = characterSkills.find(s => s.name.trim() === currentTargetName);
                
                if (charSkillData) {
                    let html = "";
                    const makeStatChips = (statsArray) => {
                        if (!statsArray || statsArray.length === 0) return '';
                        return `<div class="flex flex-wrap gap-1.5 mt-2">` + 
                            statsArray.map(stat => `<span class="px-2 py-0.5 bg-white dark:bg-slate-700 border border-gray-200 dark:border-slate-600 text-gray-700 dark:text-gray-300 text-[11px] font-bold rounded-md shadow-sm">${stat}</span>`).join('') + 
                            `</div>`;
                    };

                    const normalAttackIcon = charSkillData.attribute === "物理" ? SKILL_ICONS["attack_物理"] : SKILL_ICONS["attack_魔法"];
                    const normalSkillIcon = SKILL_ICONS[`skill_normal_${currentTargetName}`] || "";
                    const ultSkillIcon = SKILL_ICONS[`hover_avatar_${currentTargetName}`] || "";
                    const passiveSkillIcon = SKILL_ICONS[`skill_passive_${currentTargetName}`] || "";

                    html += `
                        <div class="bg-slate-50 dark:bg-slate-700/40 border-2 border-slate-300 dark:border-slate-600 rounded-xl p-4 shadow-sm">
                            <div class="flex justify-between items-center border-b border-slate-200 dark:border-slate-600 pb-2 mb-3">
                                <div class="flex items-center gap-2">
                                    ${normalAttackIcon ? `<img src="${normalAttackIcon}" class="w-8 h-8 rounded-lg shadow-sm border border-slate-300 dark:border-slate-600">` : `<span>🎯</span>`}
                                    <span class="font-extrabold text-slate-800 dark:text-slate-200 text-base">普通攻擊</span>
                                </div>
                            </div>
                            <div class="space-y-4">
                                <div>
                                    <p class="text-xs font-bold text-slate-700 dark:text-slate-300">【基本】</p>
                                    ${renderSkillContent(charSkillData.normalAttack.basic)}
                                </div>
                                ${charSkillData.normalAttack.enhanced !== "無" ? `
                                <div>
                                    <p class="text-xs font-bold text-slate-700 dark:text-slate-300">【強化】</p>
                                    ${renderSkillContent(charSkillData.normalAttack.enhanced)}
                                </div>` : ''}
                            </div>
                        </div>
                    `;

                    html += `
                        <div class="bg-emerald-50/80 dark:bg-emerald-900/20 border-2 border-emerald-300 dark:border-emerald-700 rounded-xl p-4 shadow-sm">
                            <div class="flex justify-between items-center border-b border-emerald-200 dark:border-emerald-800 pb-2 mb-3">
                                <div class="flex items-center gap-2">
                                    ${normalSkillIcon ? `<img src="${normalSkillIcon}" class="w-8 h-8 rounded-lg shadow-sm border border-emerald-300 dark:border-emerald-700">` : `<span>🟢</span>`}
                                    <span class="font-extrabold text-emerald-800 dark:text-emerald-300 text-base">${charSkillData.normalSkill.name}</span>
                                </div>
                            </div>
                            <p class="text-xs text-gray-600 dark:text-gray-300 font-medium leading-relaxed whitespace-pre-wrap">${charSkillData.normalSkill.desc}</p>
                            ${makeStatChips(charSkillData.normalSkill.stats)}
                        </div>
                    `;

                    html += `
                        <div class="bg-violet-50/80 dark:bg-violet-900/20 border-2 border-violet-300 dark:border-violet-700 rounded-xl p-4 shadow-sm">
                            <div class="flex justify-between items-center border-b border-violet-200 dark:border-violet-800 pb-2 mb-3">
                                <div class="flex items-center gap-2">
                                    ${ultSkillIcon ? `<img src="${ultSkillIcon}" class="w-8 h-8 rounded-lg shadow-sm border border-violet-300 dark:border-violet-700">` : `<span>🔥</span>`}
                                    <span class="font-extrabold text-violet-800 dark:text-violet-300 text-base">${charSkillData.ultimateSkill.name}</span>
                                </div>
                                <span class="px-2 py-0.5 bg-violet-600 dark:bg-violet-500 text-white font-black text-[10px] rounded-md shadow-sm">CD: ${charSkillData.ultimateSkill.cooldown}</span>
                            </div>
                            <p class="text-xs text-gray-600 dark:text-gray-300 font-medium leading-relaxed whitespace-pre-wrap">${charSkillData.ultimateSkill.desc}</p>
                            ${makeStatChips(charSkillData.ultimateSkill.stats)}
                        </div>
                    `;

                    html += `
                        <div class="bg-amber-50/70 dark:bg-amber-900/20 border-2 border-amber-300 dark:border-amber-700 rounded-xl p-4 shadow-sm">
                            <div class="flex justify-between items-center border-b border-amber-200 dark:border-amber-800 pb-2 mb-3">
                                <div class="flex items-center gap-2">
                                    ${passiveSkillIcon ? `<img src="${passiveSkillIcon}" class="w-8 h-8 rounded-lg shadow-sm border border-amber-300 dark:border-amber-700">` : `<span>✨</span>`}
                                    <span class="font-extrabold text-amber-800 dark:text-amber-300 text-base">被動技能</span>
                                </div>
                            </div>
                            <p class="text-xs text-gray-600 dark:text-gray-300 font-medium leading-relaxed whitespace-pre-wrap">${charSkillData.passiveSkill.desc}</p>
                            ${makeStatChips(charSkillData.passiveSkill.stats)}
                        </div>
                    `;
                    
                    skillsContainer.innerHTML = html;
                } else {
                    skillsContainer.innerHTML = `<div class="p-4 bg-gray-50 dark:bg-slate-700 text-gray-500 dark:text-gray-400 font-bold border border-gray-200 dark:border-slate-600 rounded-xl text-center">⚠️ 找不到「${currentTargetName}」的技能資料，請確認 skill.js 中有此角色。</div>`;
                }
            }

            loadComments(currentTargetName);
        };

        function getAnonymousId() {
            let anonId = localStorage.getItem('trickcal_anon_id');
            if (!anonId) {
                const randomNum = Math.floor(Math.random() * 9000) + 1000;
                anonId = `匿名教主#${randomNum}`;
                localStorage.setItem('trickcal_anon_id', anonId);
            }
            return anonId;
        }

        function loadComments(charName) {
            db.collection("character_comments")
              .where("character", "==", charName)
              .orderBy("timestamp", "desc")
              .onSnapshot((snapshot) => {
                  const list = document.getElementById('commentsList');
                  
                  if (snapshot.empty) {
                      list.innerHTML = `<div class="text-center text-sm font-bold text-gray-400 dark:text-gray-500 py-8 bg-gray-50 dark:bg-slate-800/50 rounded-xl border border-dashed border-gray-200 dark:border-slate-600">目前還沒有評價，來搶頭香吧！ 🐾</div>`;
                      return;
                  }
                  
                  let html = "";
                  snapshot.forEach(doc => {
                      const data = doc.data();
                      const timeString = data.timestamp ? new Date(data.timestamp.toDate()).toLocaleString('zh-TW', {
                          month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit'
                      }) : "剛剛";
                      
                      html += `
                          <div class="bg-white dark:bg-slate-700/80 p-3 sm:p-4 rounded-xl border border-gray-200 dark:border-slate-600 shadow-sm transition hover:shadow-md">
                              <div class="flex justify-between items-baseline mb-2 border-b border-gray-100 dark:border-slate-600 pb-2">
                                  <span class="font-black text-sm text-amber-900 dark:text-amber-400 flex items-center gap-1">
                                      👤 ${escapeHTML(data.author)}
                                  </span>
                                  <span class="text-[10px] sm:text-xs text-gray-400 dark:text-gray-400 font-medium">${timeString}</span>
                              </div>
                              <p class="text-sm text-gray-700 dark:text-gray-200 whitespace-pre-wrap leading-relaxed">${escapeHTML(data.content)}</p>
                          </div>
                      `;
                  });
                  list.innerHTML = html;
              }, (error) => {
                  console.error("讀取留言失敗:", error);
                  list.innerHTML = `<div class="text-center text-red-500 dark:text-red-400 font-bold text-sm py-4">讀取留言失敗，請確認資料庫權限設定。</div>`;
              });
        }

        function renderSkillContent(text) {
            if (!text) return "";
            const parts = text.split('|');
            const description = parts[0].trim();
            const effects = parts.length > 1 ? parts[1].split(/[,、]/).filter(p => p.trim() !== "") : [];

            let html = `<p class="text-xs text-gray-600 dark:text-gray-300 font-medium leading-relaxed whitespace-pre-wrap">${description}</p>`;
            if (effects.length > 0) {
                html += `<div class="flex flex-wrap gap-1.5 mt-2">` + 
                    effects.map(eff => `<span class="px-2 py-0.5 bg-white dark:bg-slate-700 border border-gray-200 dark:border-slate-600 text-gray-700 dark:text-gray-300 text-[11px] font-bold rounded-md shadow-sm">${eff.trim()}</span>`).join('') + 
                    `</div>`;
            }
            return html;
        }

        function submitComment() {
            let authorInput = document.getElementById('commentAuthor').value.trim();
            if (!authorInput) {
                authorInput = getAnonymousId();
            }

            const contentInput = document.getElementById('commentContent').value.trim();
            const btn = document.getElementById('submitCommentBtn');

            if (!contentInput) { alert('請輸入評價內容！'); return; }
            if (contentInput.length > 500) { alert('評價內容太長囉，請縮減至 500 字以內！'); return; }

            btn.disabled = true;
            btn.innerHTML = '傳送中... ⏳';
            btn.classList.replace('bg-amber-500', 'bg-gray-400');
            btn.classList.replace('dark:bg-amber-600', 'dark:bg-gray-500');

            db.collection("character_comments").add({
                character: currentTargetName,
                author: authorInput,
                content: contentInput,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            }).then(() => {
                document.getElementById('commentContent').value = '';
                btn.disabled = false;
                btn.innerHTML = '送出評價 🚀';
                btn.classList.replace('bg-gray-400', 'bg-amber-500');
                btn.classList.replace('dark:bg-gray-500', 'dark:bg-amber-600');
            }).catch(err => {
                console.error("留言失敗:", err);
                alert("留言失敗，請稍後再試！");
                btn.disabled = false;
                btn.innerHTML = '送出評價 🚀';
                btn.classList.replace('bg-gray-400', 'bg-amber-500');
                btn.classList.replace('dark:bg-gray-500', 'dark:bg-amber-600');
            });
        }
    </script>
</body>
</html>
