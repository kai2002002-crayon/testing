<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>角色詳細資料</title>
    <script src="data.js"></script>   
    <script src="skill.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #fcf8f2; }
    </style>
</head>
<body class="p-4 sm:p-8 text-gray-800">

    <div class="max-w-3xl mx-auto bg-white/90 backdrop-blur-md p-6 rounded-2xl shadow-md border-4 border-amber-400">
        
        <button onclick="window.close()" class="mb-4 px-4 py-2 bg-amber-500 text-white text-xs font-bold rounded-xl shadow hover:bg-amber-600 transition">
            ⬅️ 關閉此頁
        </button>

        <div class="flex flex-col sm:flex-row items-center gap-6 border-b-2 border-amber-200 pb-6 mb-6">
            <div id="charAvatar" class="w-24 h-24 rounded-2xl border-4 border-amber-500 bg-white overflow-hidden shadow-md flex items-center justify-center text-3xl font-bold text-amber-900 flex-shrink-0">
            </div>
            <div class="text-center sm:text-left w-full">
                <h1 id="charName" class="text-3xl font-extrabold text-amber-950 mb-4 tracking-tight">角色名稱</h1>
                <div class="flex flex-wrap justify-center sm:justify-start gap-2 text-xs font-bold">
                    <span id="charPersonality" class="px-3 py-1 bg-green-100 text-green-700 rounded-lg shadow-sm border border-green-200 flex items-center">性格：-</span>
                    <span id="charRace" class="px-3 py-1 bg-blue-100 text-blue-700 rounded-lg shadow-sm border border-blue-200 flex items-center">種族：-</span>
                    <span id="charPosition" class="px-3 py-1 bg-orange-100 text-orange-700 rounded-lg shadow-sm border border-orange-200 flex items-center">站位：-</span>
                    <span id="charJob" class="px-3 py-1 bg-purple-100 text-purple-700 rounded-lg shadow-sm border border-purple-200 flex items-center">職業：-</span>
                </div>
            </div>
        </div>

        <div class="mb-8">
            <h2 class="text-lg font-bold text-amber-900 mb-3 flex items-center gap-1">🖍️ 金蠟筆分佈詳情</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="bg-amber-50/60 border border-amber-200 p-3 rounded-xl">
                    <h3 class="font-bold text-amber-800 text-sm mb-2 border-b border-amber-200 pb-1">🥇 第一層</h3>
                    <ul id="layer1List" class="space-y-1 text-xs font-medium text-gray-700 list-disc list-inside"></ul>
                </div>
                <div class="bg-orange-50/60 border border-orange-200 p-3 rounded-xl">
                    <h3 class="font-bold text-orange-800 text-sm mb-2 border-b border-orange-200 pb-1">🥈 第二層</h3>
                    <ul id="layer2List" class="space-y-1 text-xs font-medium text-gray-700 list-disc list-inside"></ul>
                </div>
                <div class="bg-red-50/60 border border-red-200 p-3 rounded-xl">
                    <h3 class="font-bold text-red-800 text-sm mb-2 border-b border-red-200 pb-1">🥉 第三層</h3>
                    <ul id="layer3List" class="space-y-1 text-xs font-medium text-gray-700 list-disc list-inside"></ul>
                </div>
            </div>
        </div>

        <div class="mt-6 pt-6 border-t-2 border-amber-200">
            <h2 class="text-xl font-black text-amber-950 mb-4 flex items-center gap-1.5">⚔️ 技能詳細資料</h2>
            <div id="skillsContainer" class="space-y-5"></div>
        </div>
    </div>

    <script>
        const ICON_MAP = {
            "personality_天真": "https://i.postimg.cc/J7ZWLD30/tian-zhen.png",
            "personality_活潑": "https://i.postimg.cc/4ykkcsGt/huo-po.png",
            "personality_冷靜": "https://i.postimg.cc/xjMS2JGd/leng-jing.png",
            "personality_狂亂": "https://i.postimg.cc/ryxLk0Gm/kuang-luan.png",
            "personality_憂鬱": "https://i.postimg.cc/g07PY3BR/you-yu.png",
            "race_精靈": "https://i.postimg.cc/D4THRGwZ/jing-ling.png",
            "race_龍族": "https://i.postimg.cc/QK3wv7dB/long-zu.png",
            "race_妖精": "https://i.postimg.cc/SYh3H9xn/yao-jing.png",
            "race_魔靈": "https://i.postimg.cc/H89RmLrW/mo-ling.png",
            "race_獸人": "https://i.postimg.cc/sGrqbWgQ/shou-ren.png",
            "race_幽靈": "https://i.postimg.cc/tnjw8647/you-ling.png",
            "race_魔女": "https://i.postimg.cc/H8gRFMk8/mo-nu.png",
            "race_???": "https://i.postimg.cc/zHr64hGf/unknown.png",
            "position_前排": "https://i.postimg.cc/VvBTbtDy/qian-pai.png",
            "position_中排": "https://i.postimg.cc/RZ08NNtT/zhong-pai.png",
            "position_後排": "https://i.postimg.cc/DwC9gqFk/hou-pai.png",
            "job_肉盾": "https://i.postimg.cc/zfGJDzDB/rou-dun.png",
            "job_輔助": "https://i.postimg.cc/MG3zvCXJ/fu-zhu.png",
            "job_輸出": "https://i.postimg.cc/3wf3dsWH/shu-chu.png"
        };

        const updateTag = (id, label, value, prefix) => {
            const el = document.getElementById(id);
            const iconUrl = ICON_MAP[`${prefix}_${value}`] || "";
            el.innerHTML = `
                ${iconUrl ? `<img src="${iconUrl}" class="w-4 h-4 object-contain mr-1.5">` : ""}
                <span>${label}：${value}</span>
            `;
        };

        const urlParams = new URLSearchParams(window.location.search);
        const targetName = urlParams.get('char');

        // 這裡做一個簡單的除錯檢查
        if (!targetName) {
            document.body.innerHTML = "❌ 未指定角色";
        } else if (typeof INITIAL_DATA === 'undefined') {
            document.body.innerHTML = "❌ 找不到 INITIAL_DATA (請檢查 index.html 或變數定義)";
        } else {
            const charData = INITIAL_DATA.find(c => c.name === targetName);
            // 確保這裡是 characterSkills，請檢查您的 skill.js 變數名稱是否為這個
            const charSkillData = (typeof characterSkills !== 'undefined') ? characterSkills.find(s => s.name === targetName) : null;

            if (charData) {
                document.getElementById('charName').innerText = charData.name;
                updateTag('charPersonality', '性格', charData.personality, 'personality');
                updateTag('charRace', '種族', charData.race, 'race');
                updateTag('charPosition', '站位', charData.position, 'position');
                updateTag('charJob', '職業', charData.job, 'job');
                
                // ... (其餘渲染邏輯保持不變，略過以縮短長度) ...
            }
        }
    </script>
</body>
</html>
